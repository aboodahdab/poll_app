<div class="w-full h-full flex justify-center items-center">
  <div
    class="border-t-solid border-t-[rgb(129,140,248)] border-t-[4px] p-6 rounded-[0.375rem] bg-[rgb(31,41,55)] flex-col"
  >
    <div class="text-[30px] flex justify-center">
      {% if error_reason %} {{ error_reason }} {% endif %}
    </div>
    <div class="mt-8">
      <img
        src="frontend/images/error-img.png"
        alt=""
        class="h-[350px] w-[350px] mx-42"
      />
    </div>
    <div class="text-gray-500 text-center mt-8">
      Are you sure you typed this link in correctly?
      <br />If you followed a link to this address, please let us know!
    </div>
    <div class="flex justify-center mt-8">
      <button
        class="bg-[rgb(99,102,241)] py-2 px-4 rounded-[0.375rem] text-sm"
        id="go-to-start-btn"
      >
        go to the start page
      </button>
    </div>
  </div>
</div>
